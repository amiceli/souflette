<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Tri images</title>
		<link rel="stylesheet" href="./node_modules/@picocss/pico/css/pico.min.css">
		<style>
			body {
				height: 100vh;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}

			nav {
				padding: 1rem;
				border-bottom: 1px solid var(--border-color);
			}

			.container {
				flex: 1;
				display: flex;
				gap: 2rem;
				align-items: stretch;
				overflow: hidden;
				padding: 1rem;
			}

			.left {
				flex: 3;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: auto;
			}

			.left img {
				max-width: 100%;
				max-height: 100%;
				object-fit: contain;
			}

			.right {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: auto;
			}

			.right h1 {
				font-size: 1.5rem;
				margin: 0 0 0.5rem 0;
				word-break: break-all;
			}

			.right p {
				font-size: 0.875rem;
				color: var(--muted-color);
				margin: 0 0 1rem 0;
				word-break: break-all;
			}

			.button-group {
				display: flex;
				flex-wrap: wrap;
				gap: 0.5rem;
				margin-bottom: 1rem;
			}

			.button-group button {
				flex: 1;
				min-width: 100px;
				padding: 0.5rem;
				font-size: 0.875rem;
			}

			.controls {
				padding: 1rem;
				border-top: 1px solid var(--border-color);
				display: flex;
				gap: 1rem;
				justify-content: center;
				flex-wrap: wrap;
			}

			.controls button {
				padding: 0.75rem 1.5rem;
			}

			.stats {
				font-size: 0.875rem;
				color: var(--muted-color);
				text-align: center;
				padding: 0.5rem;
				border-top: 1px solid var(--border-color);
			}
		</style>
	</head>
	<body>
		<nav>
			<button id="pickButton" type="button"></button>
		</nav>

		<div class="container" id="container" style="display: none;">
			<div class="left">
				<img id="currentImage" alt="">
			</div>

			<div class="right">
				<h1 id="imageName">–</h1>
				<p id="imagePath"></p>

				<div class="button-group">
					<button id="copyNameBtn" type="button"></button>
					<button id="copyPathBtn" type="button"></button>
				</div>

				<div id="keptList" style="flex: 1; overflow: auto; margin-bottom: 1rem;">
					<h3 id="keptListTitle">–</h3>
					<ul id="keptItems" style="font-size: 0.875rem;"></ul>
				</div>
			</div>
		</div>

		<div class="controls" id="controls" style="display: none;">
			<button id="prevBtn" type="button"></button>
			<button id="keepBtn" type="button" aria-pressed="false"></button>
			<button id="deleteBtn" type="button" aria-pressed="false"></button>
			<button id="nextBtn" type="button"></button>
		</div>

		<div class="stats">
			<span id="stats"></span>
		</div>

		<script src="./src/index.js"></script>
	</body>
</html>
